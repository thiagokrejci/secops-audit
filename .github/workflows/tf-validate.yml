name: Terraform Validate
on:
  pull_request:
    paths:
      - '**/*.tf'
      - '**/*.tfvars'
      - 'terragrunt.hcl'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: '1.3.9'
      - name: Install tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y jq
          curl -sSL https://raw.githubusercontent.com/aquasecurity/tfsec/master/scripts/install_linux.sh | bash || true
      - name: Run tf-validate wrapper
        run: ./scripts/tf-validate-wrapper.sh .
      - name: Upload artifacts (plan)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tf-validate-artifacts
          path: |
            ./tfplan
            ./reports || true
