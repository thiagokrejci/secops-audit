name: AWS Credentials Monitor
on:
  schedule:
    - cron: '0 * * * *' # hourly

jobs:
  creds-check:
    runs-on: self-hosted
    steps:
      - name: Run detect-aws-credentials
        run: ./scripts/detect-aws-credentials.sh || true
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: aws-creds-report
          path: detect-aws-credentials.json
